name: update-tv

on:

 schedule:
  - cron: '0 21 * * *'

 workflow_dispatch:

jobs:

 build:

  runs-on: ubuntu-latest

  steps:

  - uses: actions/checkout@v3

  - name: install
    run: |
      pip install requests beautifulsoup4

  - name: run
    run: |
      python make_tv.py

  - name: commit
    run: |
      git config --global user.name github-actions
      git config --global user.email actions@github.com
      git add my_tv.json
      git commit -m "update tv" || echo nochange
      git push
