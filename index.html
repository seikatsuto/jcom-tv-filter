<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TV番組フィルタ</title>

<style>
body { font-family: sans-serif; background:#f4f4f4; padding:20px; }
table { border-collapse:collapse; width:100%; background:white; }
th,td { border:1px solid #ccc; padding:8px; }
th { background:#333; color:white; }
tr:nth-child(even){ background:#eee; }
</style>

</head>

<body>

<h1>TV番組（今日＋明日）</h1>

<table id="tv">
<tr>
<th>日</th>
<th>時間</th>
<th>Ch</th>
<th>JCOM</th>
<th>番組</th>
<th>KW</th>
</tr>
</table>

<script>
fetch("my_tv.json")
.then(r=>r.json())
.then(data=>{

let t=document.getElementById("tv")

data.programs.forEach(p=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${p.date}</td>
<td>${p.time}</td>
<td>${p.channel}</td>
<td>${p.jcom}</td>
<td>${p.title}</td>
<td>${p.keyword}</td>
`

t.appendChild(tr)

})

})
</script>

</body>
</html>
