<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TVキーワード番組表</title>

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
padding:30px;
}

h1{
margin-bottom:20px;
}

table{
border-collapse:collapse;
background:white;
width:100%;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#333;
color:white;
}

img{
width:120px;
}

</style>

</head>

<body>

<h1>TVキーワード番組表（今日＋明日）</h1>

<table id="tv">

<tr>
<th>日</th>
<th>時間</th>
<th>Ch</th>
<th>JCOM</th>
<th>番組</th>
<th>画像</th>
</tr>

</table>

<script>

fetch("my_tv.json")
.then(r=>r.json())
.then(data=>{

let table=document.getElementById("tv")

data.programs.forEach(p=>{

let img="https://placehold.jp/120x70.png"

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${p.date}</td>
<td>${p.time}</td>
<td>${p.channel}</td>
<td>${p.jcom}</td>
<td>
<a href="${p.url}" target="_blank">
${p.title}
</a>
</td>
<td>
<img src="${img}">
</td>

`

table.appendChild(tr)

})

})

</script>

</body>
</html>
